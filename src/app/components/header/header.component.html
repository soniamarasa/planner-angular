<header class="header">
  <div class="header-actions-bar">
    <div class="header-actions planner-shell">
      <nav class="header-toolbar" [attr.aria-label]="'nav.planner' | translate">
      <a
        pButton
        pRipple
        routerLink="/"
        icon="pi pi-calendar"
        class="p-button-rounded p-button-text header-toolbar__btn"
        [class.header-toolbar__btn--active]="isPlannerHome"
        [pTooltip]="'nav.planner' | translate"
        tooltipPosition="bottom"
        [attr.aria-label]="'nav.planner' | translate"
      ></a>
      <a
        pButton
        pRipple
        routerLink="/projects"
        icon="pi pi-folder"
        class="p-button-rounded p-button-text header-toolbar__btn"
        [class.header-toolbar__btn--active]="isProjects"
        [pTooltip]="'nav.projects' | translate"
        tooltipPosition="bottom"
        [attr.aria-label]="'nav.projects' | translate"
      ></a>
      <a
        pButton
        pRipple
        routerLink="/focus"
        icon="pi pi-clock"
        class="p-button-rounded p-button-text header-toolbar__btn"
        [pTooltip]="'nav.focus' | translate"
        tooltipPosition="bottom"
        [attr.aria-label]="'nav.focus' | translate"
      ></a>
      <a
        pButton
        pRipple
        routerLink="/dashboard"
        icon="pi pi-chart-bar"
        class="p-button-rounded p-button-text header-toolbar__btn"
        [class.header-toolbar__btn--active]="isDashboard"
        [pTooltip]="'nav.dashboard' | translate"
        tooltipPosition="bottom"
        [attr.aria-label]="'nav.dashboard' | translate"
      ></a>
      <button
        *ngIf="isPlannerHome"
        pButton
        pRipple
        type="button"
        icon="pi pi-refresh"
        class="p-button-rounded p-button-text header-toolbar__btn"
        [pTooltip]="'nav.clearWeek' | translate"
        tooltipPosition="bottom"
        [attr.aria-label]="'nav.clearWeek' | translate"
        (click)="confirmClearWeek()"
      ></button>
    </nav>

    <div class="header-user">
      <button
        type="button"
        class="header-user__trigger"
        (click)="userMenu.toggle($event)"
        [attr.aria-label]="'nav.userMenu' | translate"
      >
        <img [src]="gravatarUrl" alt="" class="header-user__avatar" width="36" height="36" />
        <span class="header-user__name">{{ userFirstName }}</span>
        <i class="pi pi-chevron-down header-user__chevron"></i>
      </button>
      <p-menu #userMenu [model]="userMenuItems" [popup]="true" appendTo="body"></p-menu>
    </div>
    </div>
  </div>

  <div class="header-brand">
    <h1>{{ (isPlannerHome ? 'header.weeklyPlanner' : pageTitleKey) | translate }}</h1>
    <p class="header-date" *ngIf="isPlannerHome">{{ todayIs }}</p>
    <p class="header-greeting" *ngIf="isPlannerHome && userFirstName">{{ 'header.greeting' | translate: { name: userFirstName } }}</p>
  </div>
</header>

<p-dialog
  [header]="'header.theme' | translate"
  [(visible)]="themeVisible"
  [modal]="true"
  [appendTo]="'body'"
  [draggable]="false"
  [dismissableMask]="true"
  [style]="{ width: 'min(420px, calc(100vw - 2rem))' }"
  [styleClass]="dialogStyleClass"
  [maskStyleClass]="'planner-dialog-mask'"
>
  <p class="theme-picker__hint">{{ 'header.themeHint' | translate }}</p>
  <div class="theme-picker">
    <button
      type="button"
      class="theme-picker__option"
      *ngFor="let themeOption of themes"
      [class.theme-picker__option--active]="themeService.theme === themeOption.code"
      (click)="changeTheme(themeOption.code)"
    >
      <span
        class="theme-picker__preview"
        [attr.data-theme]="themeOption.code"
        aria-hidden="true"
      ></span>
      <span class="theme-picker__label">{{ themeOption.labelKey | translate }}</span>
    </button>
  </div>

  <h3 class="theme-picker__section">{{ 'header.language' | translate }}</h3>
  <p class="theme-picker__hint">{{ 'header.languageHint' | translate }}</p>
  <div class="theme-picker">
    <button
      type="button"
      class="theme-picker__option theme-picker__option--lang"
      *ngFor="let languageOption of languages"
      [class.theme-picker__option--active]="currentLanguage === languageOption.code"
      (click)="changeLanguage(languageOption.code)"
    >
      <span class="theme-picker__label">{{ languageOption.labelKey | translate }}</span>
    </button>
  </div>
</p-dialog>

<p-confirmDialog
  [appendTo]="'body'"
  [styleClass]="dialogStyleClass"
  [maskStyleClass]="'planner-dialog-mask'"
></p-confirmDialog>
