<header class="header">
  <div class="header-actions-bar">
    <div class="header-actions planner-shell">
      <nav class="header-toolbar" aria-label="Planner navigation">
      <a
        pButton
        pRipple
        routerLink="/"
        icon="pi pi-calendar"
        class="p-button-rounded p-button-text header-toolbar__btn"
        [class.header-toolbar__btn--active]="isPlannerHome"
        pTooltip="Planner"
        tooltipPosition="bottom"
        aria-label="Planner"
      ></a>
      <a
        pButton
        pRipple
        routerLink="/projects"
        icon="pi pi-folder"
        class="p-button-rounded p-button-text header-toolbar__btn"
        [class.header-toolbar__btn--active]="isProjects"
        pTooltip="Projects"
        tooltipPosition="bottom"
        aria-label="Projects"
      ></a>
      <a
        pButton
        pRipple
        routerLink="/focus"
        icon="pi pi-clock"
        class="p-button-rounded p-button-text header-toolbar__btn"
        pTooltip="Focus Mode"
        tooltipPosition="bottom"
        aria-label="Focus Mode"
      ></a>
      <a
        pButton
        pRipple
        routerLink="/dashboard"
        icon="pi pi-chart-bar"
        class="p-button-rounded p-button-text header-toolbar__btn"
        [class.header-toolbar__btn--active]="isDashboard"
        pTooltip="Dashboard"
        tooltipPosition="bottom"
        aria-label="Dashboard"
      ></a>
      <button
        *ngIf="isPlannerHome"
        pButton
        pRipple
        type="button"
        icon="pi pi-refresh"
        class="p-button-rounded p-button-text header-toolbar__btn"
        pTooltip="Limpar esta semana"
        tooltipPosition="bottom"
        aria-label="Limpar esta semana"
        (click)="confirmClearWeek()"
      ></button>
    </nav>

    <div class="header-user">
      <button
        type="button"
        class="header-user__trigger"
        (click)="userMenu.toggle($event)"
        aria-label="User menu"
      >
        <img [src]="gravatarUrl" alt="" class="header-user__avatar" width="36" height="36" />
        <span class="header-user__name">{{ userFirstName }}</span>
        <i class="pi pi-chevron-down header-user__chevron"></i>
      </button>
      <p-menu #userMenu [model]="userMenuItems" [popup]="true" appendTo="body"></p-menu>
    </div>
    </div>
  </div>

  <div class="header-brand">
    <h1>{{ isPlannerHome ? 'Weekly Planner' : pageTitle }}</h1>
    <p class="header-date" *ngIf="isPlannerHome">{{ todayIs }}</p>
    <p class="header-greeting" *ngIf="isPlannerHome && userFirstName">Hello, {{ userFirstName }}</p>
  </div>
</header>

<p-dialog
  header="Theme"
  [(visible)]="themeVisible"
  [modal]="true"
  [appendTo]="'body'"
  [draggable]="false"
  [dismissableMask]="true"
  [style]="{ width: 'min(420px, calc(100vw - 2rem))' }"
  [styleClass]="dialogStyleClass"
  [maskStyleClass]="'planner-dialog-mask'"
>
  <p class="theme-picker__hint">Choose how the planner looks on this device.</p>
  <div class="theme-picker">
    <button
      type="button"
      class="theme-picker__option"
      *ngFor="let themeOption of themes"
      [class.theme-picker__option--active]="themeService.theme === themeOption.code"
      (click)="changeTheme(themeOption.code)"
    >
      <span
        class="theme-picker__preview"
        [attr.data-theme]="themeOption.code"
        aria-hidden="true"
      ></span>
      <span class="theme-picker__label">{{ themeOption.name }}</span>
    </button>
  </div>
</p-dialog>

<p-confirmDialog
  [appendTo]="'body'"
  [styleClass]="dialogStyleClass"
  [maskStyleClass]="'planner-dialog-mask'"
></p-confirmDialog>
