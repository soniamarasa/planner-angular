<div class="acoes">
    <i *ngIf="item.type === 'task' && !item.finished && !item.canceled" class="pi pi-clock" id="focus" pTooltip="Focus"
        (click)="openFocusMode(); $event.stopPropagation()"></i>
    <i class="pi pi-check-square" id="complete" pTooltip="Finished"
        (click)="facade.actionsControl(item.id,'finished', item.where, item.finished); $event.stopPropagation()"></i>
    <i class="pi pi-play" id="started" pTooltip="Started"
        (click)="facade.actionsControl(item.id,'started', item.where, item.started); $event.stopPropagation()"></i>
    <i class="pi pi-pencil" id="edit" pTooltip="Edit" (click)="editDialog(); $event.stopPropagation()"></i>
    <i class="pi pi-exclamation-triangle" id="important" pTooltip="Important"
        (click)="facade.actionsControl(item.id,'important', item.where, item.important); $event.stopPropagation()"></i>
    <i class="pi pi-times" pTooltip="Canceled" id="canceled"
        (click)="facade.actionsControl(item.id,'canceled', item.where, item.canceled); $event.stopPropagation()"></i>
    <i class="pi pi-trash" id="delete" pTooltip="Delete"
        (click)="facade.actionsControl(item.id, 'delete', item.where, null); $event.stopPropagation()"></i>
</div>
