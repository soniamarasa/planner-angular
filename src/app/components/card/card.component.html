<p-card class="container-card" [ngClass]="{ 'calendar-card': isCalendar }">
  <div>
    <img src="../../../assets/pin.png" *ngIf="isTodayColumn" alt="pin" />
    <h2 *ngIf="day">{{ day }}</h2>
    <p class="column-date" *ngIf="columnDateLabel">{{ columnDateLabel }}</p>
    <h3 *ngIf="titleBox">{{ titleBox }}</h3>
  </div>

  <ng-container *ngIf="day || !isCalendar">
    <ul class="item" *ngIf="items.length > 0">
      <ng-container *ngFor="let item of items">
        <ng-container *ngIf="matchesItem(item)">
          <li
            [ngClass]="{
              task: item.type === 'task',
              event: item.type === 'event',
              appointment: item.type === 'appointment',
              note: item.type === 'note',
              tv: item.type === 'tv',
              finished: item.finished,
              started: item.started,
              important: item.important,
              canceled: item.canceled,
              overdue: item.is_overdue
            }"
            (click)="facade.actionsControl(item.id, null, null, null)"
          >
            <i
              *ngIf="item.type === 'task' && !item.finished"
              class="pi pi-circle-off"
            ></i>
            <i
              *ngIf="item.type === 'task' && item.finished"
              class="pi pi-check-circle"
            ></i>
            <i *ngIf="item.type === 'event'" class="pi pi-circle-on"></i>
            <i *ngIf="item.type === 'appointment'" class="pi pi-calendar"></i>
            <i *ngIf="item.type === 'note'" class="pi pi-file"></i>
            <i *ngIf="item.type === 'tv'" class="pi pi-youtube"></i>

            <span
              ><span
                class="project-chip"
                *ngIf="item.project_icon"
                [style.color]="item.project_color || 'inherit'"
                [attr.aria-label]="item.project_name || ('planner.project' | translate)"
              >
                <i [class]="projectIconClass(item.project_icon)"></i>
              </span>{{ item.description }}
              <i *ngIf="item.important" class="pi pi-exclamation-triangle"></i>
            </span>

            <p class="obs" *ngIf="item.obs !== ''">
              <i class="pi pi-reply"></i>{{ item.obs }}
            </p>

            <p class="carried-from" *ngIf="item.carried_from">
              <i class="pi pi-replay"></i>{{ 'planner.from' | translate: { date: formatCarriedFrom(item) } }}
            </p>

            <app-actions-item
              *ngIf="item.id === facade.currentId"
              [item]="item"
            >
            </app-actions-item>
          </li>
        </ng-container>
      </ng-container>
    </ul>

    <ng-template pTemplate="footer"> </ng-template>
  </ng-container>

  <ng-container *ngIf="isCalendar">
    <div class="calendar-shell">
      <p-datepicker
        [(ngModel)]="value"
        [inline]="true"
        [firstDayOfWeek]="1"
        styleClass="planner-inline-calendar"
        panelStyleClass="planner-inline-calendar-panel"
      ></p-datepicker>
    </div>
  </ng-container>
</p-card>
