<form [formGroup]="form">
  <div class="row01">
    <p-select
      [options]="type"
      [placeholder]="'form.type' | translate"
      optionLabel="name"
      optionValue="code"
      formControlName="type"
      appendTo="body"
    >
    </p-select>
  </div>

  <input
    type="text"
    pInputText
    class="p-inputtext p-inputtext-md"
    formControlName="description"
    [placeholder]="'form.description' | translate"
  />

  <input
    type="text"
    formControlName="obs"
    pInputText
    class="p-inputtext p-inputtext-md"
    [placeholder]="'form.observation' | translate"
  />

  <div class="field">
    <p-select
      [options]="projectOptions"
      [placeholder]="'form.projectOptional' | translate"
      optionLabel="name"
      optionValue="code"
      formControlName="projectId"
      appendTo="body"
    ></p-select>
  </div>

  <div class="field placement-field">
    <label for="editScheduledDate" class="placement-label">{{ 'form.date' | translate }}</label>
    <p-datepicker
      inputId="editScheduledDate"
      formControlName="scheduledDate"
      dateFormat="dd M yy"
      [showIcon]="true"
      [showButtonBar]="true"
      appendTo="body"
      [placeholder]="'form.pickDay' | translate"
    ></p-datepicker>
  </div>

  <div class="where-check">
    <div class="p-field-checkbox">
      <p-checkbox formControlName="notes" [binary]="true" inputId="editNotes"></p-checkbox>
      <label for="editNotes">{{ 'form.notes' | translate }}</label>
    </div>
    <div class="p-field-checkbox">
      <p-checkbox formControlName="todo" [binary]="true" inputId="editTodo"></p-checkbox>
      <label for="editTodo">{{ 'form.todo' | translate }}</label>
    </div>
  </div>

  <div id="button-div">
    <button
      pButton
      pRipple
      type="submit"
      (keydown.enter)="editItem()"
      [label]="'form.save' | translate"
      (click)="editItem()"
      class="p-button-raised p-button-success"
    ></button>
  </div>
</form>

<p-toast position="bottom-center"></p-toast>
